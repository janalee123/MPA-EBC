name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/**'
  workflow_dispatch:

env:
  RESOURCE_GROUP: agentic-ai-demo-RG
  LOCATION: eastus
  ACR_NAME: oceanxacr
  ENVIRONMENT_NAME: ocean-x-env
  APP_NAME: ocean-x-mcp
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create ACR if not exists
        run: |
          if ! az acr show --name $ACR_NAME --resource-group $RESOURCE_GROUP 2>/dev/null; then
            az acr create \
              --resource-group $RESOURCE_GROUP \
              --name $ACR_NAME \
              --sku Basic \
              --admin-enabled true \
              --location $LOCATION
          fi

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image jana/ocean-x-mcp-demo:$IMAGE_TAG \
            --image jana/ocean-x-mcp-demo:latest \
            --file mcp-server/Dockerfile \
            mcp-server/

      - name: Create Container Apps Environment if not exists
        run: |
          if ! az containerapp env show --name $ENVIRONMENT_NAME --resource-group $RESOURCE_GROUP 2>/dev/null; then
            az containerapp env create \
              --name $ENVIRONMENT_NAME \
              --resource-group $RESOURCE_GROUP \
              --location $LOCATION
          fi

      - name: Deploy to Container Apps
        run: |
          ACR_LOGIN_SERVER=$(az acr show --name $ACR_NAME --resource-group $RESOURCE_GROUP --query loginServer -o tsv)
          ACR_USERNAME=$(az acr credential show --name $ACR_NAME --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name $ACR_NAME --query "passwords[0].value" -o tsv)
          
          if az containerapp show --name $APP_NAME --resource-group $RESOURCE_GROUP 2>/dev/null; then
            az containerapp update \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --image "$ACR_LOGIN_SERVER/jana/ocean-x-mcp-demo:$IMAGE_TAG"
          else
            az containerapp create \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --environment $ENVIRONMENT_NAME \
              --image "$ACR_LOGIN_SERVER/jana/ocean-x-mcp-demo:$IMAGE_TAG" \
              --registry-server $ACR_LOGIN_SERVER \
              --registry-username $ACR_USERNAME \
              --registry-password $ACR_PASSWORD \
              --target-port 8000 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 0.5 \
              --memory 1Gi
          fi

      - name: Get deployment URL
        run: |
          FQDN=$(az containerapp show --name $APP_NAME --resource-group $RESOURCE_GROUP --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "## Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**App URL:** https://$FQDN" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**MCP Endpoint:** https://$FQDN/mcp" >> $GITHUB_STEP_SUMMARY

      - name: Test MCP endpoint
        run: |
          FQDN=$(az containerapp show --name $APP_NAME --resource-group $RESOURCE_GROUP --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Testing MCP endpoint..."
          curl -s -X POST "https://$FQDN/mcp" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"initialize","params":{"capabilities":{}},"id":1}' | jq .
